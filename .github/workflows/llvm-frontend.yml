name: LLVM frontend

on:
  pull_request:
    paths:
      - 'frontends/llvm/**'
      - '.github/workflows/llvm-frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontends/llvm/**'
  workflow_dispatch:
    inputs:
      run_lto:
        description: 'Also run full LTO build (takes ~60 min)'
        type: boolean
        default: false
  schedule:
    # Full LTO build every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions: read-all

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Fast — install LLVM from apt.llvm.org, run test_build.sh
  #
  # Covers:
  #   - patch-llvm.sh sed patterns for the installed version
  #   - Syntax check (all #if LLVM_VERSION_MAJOR branches active for that ver)
  #   - End-to-end: build .so, run via opt, check YAML, arg names, branch sides
  # Does NOT cover: LTO path (plugin embedded in clang, whole-program IR)
  # ─────────────────────────────────────────────────────────────────────────
  plugin-tests:
    name: Plugin tests (LLVM ${{ matrix.llvm }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        llvm: [18, 22]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Add LLVM ${{ matrix.llvm }} apt repository
        run: |
          sudo apt-get install -y gpg wget
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] \
            http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${{ matrix.llvm }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q

      - name: Install LLVM ${{ matrix.llvm }}
        run: |
          sudo apt-get install -y \
            clang-${{ matrix.llvm }} \
            llvm-${{ matrix.llvm }}-dev \
            libclang-${{ matrix.llvm }}-dev \
            python3-yaml
          echo "Include dir: $(llvm-config-${{ matrix.llvm }} --includedir)"
          # PassPlugin.h may be absent from binary packages; test_plugin_reg.cpp
          # handles this with a conditional forward-declaration.
          if [ -f "$(llvm-config-${{ matrix.llvm }} --includedir)/llvm/Passes/PassPlugin.h" ]; then
            echo "PassPlugin.h present"
          else
            echo "PassPlugin.h absent (forward-decl will be used)"
          fi

      - name: Run tests
        run: |
          cd frontends/llvm
          bash test_build.sh all ${{ matrix.llvm }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Full LTO build from source
  #
  # Covers everything Job 1 does PLUS:
  #   - patch-llvm.sh actually modifies the LLVM tree correctly
  #   - Plugin compiles as part of the LLVM build
  #   - Patched clang produces correct output with -flto (whole-program IR)
  #
  # Triggered by: schedule (Monday), workflow_dispatch with run_lto=true
  # NOT triggered on every PR (too slow for routine checks).
  # ─────────────────────────────────────────────────────────────────────────
  lto-build:
    name: Full LTO build (llvmorg-22.1.0)
    runs-on: ubuntu-22.04
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_lto == true)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build python3-yaml

      # Cache the LLVM build. Key includes the LLVM tag and patch-llvm.sh
      # so that a change to either invalidates the cache.
      - name: Cache LLVM build
        id: cache-llvm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            build/llvm-build
            build/llvm-project
          key: llvm-22.1.0-clang-lld-${{ hashFiles('frontends/llvm/patch-llvm.sh') }}

      - name: Clone LLVM source
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          mkdir -p build
          cd build
          git clone --depth 1 --branch llvmorg-22.1.0 \
            https://github.com/llvm/llvm-project.git

      - name: Apply patch-llvm.sh and copy plugin sources
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          cd build/llvm-project
          bash $GITHUB_WORKSPACE/frontends/llvm/patch-llvm.sh
          cp -r $GITHUB_WORKSPACE/frontends/llvm/include/llvm/Transforms/FuzzIntrospector \
                llvm/include/llvm/Transforms/
          cp -r $GITHUB_WORKSPACE/frontends/llvm/lib/Transforms/FuzzIntrospector \
                llvm/lib/Transforms/

      - name: Configure LLVM (X86 only, Release, clang + lld)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          mkdir -p build/llvm-build
          cd build/llvm-build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD=X86 \
            -DLLVM_ENABLE_RTTI=ON \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            ../llvm-project/llvm

      - name: Build LLVM + patched clang
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          cd build/llvm-build
          ninja clang lld -j$(nproc)

      # When the cache is hit, the plugin sources may have changed — rebuild.
      - name: Rebuild patched clang (cache-hit path)
        if: steps.cache-llvm.outputs.cache-hit == 'true'
        run: |
          cp -r frontends/llvm/include/llvm/Transforms/FuzzIntrospector \
                build/llvm-project/llvm/include/llvm/Transforms/
          cp -r frontends/llvm/lib/Transforms/FuzzIntrospector \
                build/llvm-project/llvm/lib/Transforms/
          cd build/llvm-build
          ninja clang lld -j$(nproc)

      - name: Verify LTO pipeline injection
        run: |
          echo "=== FuzzIntrospectorPass in PassBuilderPipelines.cpp ==="
          grep -n 'FuzzIntrospectorPass' \
            build/llvm-project/llvm/lib/Passes/PassBuilderPipelines.cpp \
            || echo "NOT FOUND — patch did not apply to LTO pipeline"
          echo "=== FuzzIntrospector library ==="
          ls -la build/llvm-build/lib/libLLVMFuzzIntrospector* 2>/dev/null \
            || echo "Library not found (not built as shared lib — OK for in-tree)"
          echo "=== lld binary ==="
          ls -la build/llvm-build/bin/ld.lld build/llvm-build/bin/lld 2>/dev/null \
            || echo "lld binary not found"

      - name: Smoke-test patched clang
        run: |
          CLANG=$GITHUB_WORKSPACE/build/llvm-build/bin/clang
          echo 'int main(){}' | $CLANG -x c - -o /dev/null
          $CLANG --version

      # Compile the test fuzzer with -flto so the plugin sees whole-program IR.
      # The fuzzer source has no main(), so add a tiny driver; otherwise the
      # link fails before the LTO backend has a chance to run the pass.
      - name: Compile test fuzzer with -flto
        run: |
          CLANG=$GITHUB_WORKSPACE/build/llvm-build/bin/clang++
          LLD_DIR=$GITHUB_WORKSPACE/build/llvm-build/bin
          mkdir -p /tmp/fi_lto_out
          cat > /tmp/fi_lto_main.cpp <<'EOF'
          #include <cstddef>
          #include <cstdint>

          extern "C" int LLVMFuzzerTestOneInput(const uint8_t *data, size_t size);

          int main(int argc, char **argv) {
            uint8_t data[1] = {0};
            (void)argv;
            return LLVMFuzzerTestOneInput(data, static_cast<size_t>(argc));
          }
          EOF
          FUZZ_INTROSPECTOR=1 \
          FUZZ_INTROSPECTOR_FORCE_RUN=1 \
          FUZZINTRO_OUTDIR=/tmp/fi_lto_out \
          FI_BRANCH_PROFILE=1 \
            $CLANG -flto -g -O1 -fno-inline -include stdint.h \
              frontends/llvm/../../tests/cpp-simple-example-1/fuzzer.cpp \
              /tmp/fi_lto_main.cpp \
              -o /tmp/fi_lto_out/fuzzer_lto \
              -B"$LLD_DIR" \
              -fuse-ld=lld
          echo "=== /tmp/fi_lto_out contents ==="
          ls -la /tmp/fi_lto_out/

      - name: Check LTO plugin output
        run: |
          python3 - <<'PYEOF'
          import yaml, glob, sys, os

          files = glob.glob('/tmp/fi_lto_out/*.data.yaml')
          if not files:
              print('FAIL: no YAML output produced — plugin did not run under LTO')
              sys.exit(1)

          with open(files[0]) as f:
              data = yaml.safe_load(f)

          fns = {fn['functionName']: fn
                 for fn in data.get('All functions', {}).get('Elements', [])}

          errors = []

          # Entry point must be present (proves whole-program IR was visible)
          if 'LLVMFuzzerTestOneInput' not in fns:
              errors.append('LLVMFuzzerTestOneInput not found (whole-program IR missing?)')

          # ex4(size_t s) — branch with two sides
          ex4 = next((v for k, v in fns.items() if '_Z3ex4m' in k), None)
          if ex4 is None:
              errors.append('ex4 not found')
          else:
              bp = ex4.get('BranchProfiles', [])
              if not bp:
                  errors.append('ex4 has no BranchProfiles')
              else:
                  entry  = bp[0]
                  br_str = entry.get('Branch String', '')
                  sides  = entry.get('Branch Sides', [])
                  br_line = br_str.split(':')[-1].split(',')[0] if ':' in br_str else ''
                  if len(sides) != 2:
                      errors.append(f'ex4: expected 2 branch sides, got {len(sides)}')
                  for s in sides:
                      loc  = s.get('BranchSide', '')
                      line = loc.split(':')[-1].split(',')[0] if ':' in loc else ''
                      if line and line == br_line:
                          errors.append(f'branch side {loc!r} == branch line (PrevLoc not filtering)')

          if errors:
              print('FAIL: ' + '; '.join(errors))
              sys.exit(1)
          else:
              print(f'PASS: LTO output correct, {len(fns)} functions, branch sides OK')
          PYEOF
